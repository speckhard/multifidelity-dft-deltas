# conf/config.yaml

defaults:
  - _self_  # Required for Hydra 1.1+

# --- WandB Settings ---
# These are defaults. They can be overridden by +wandb_group="my_sweep"
wandb_project: "egnn-delta-learning"
wandb_group: "default_experiment"

# --- Paths ---
# Use absolute paths or standard relative ones
data_file: "/u/dansp/egnn/relaxation_data_with_kpoints/data/delta_combined_relaxations_11_32_11__1_1_2026_egnn_data.pt"
job_name: "delta_gnn_run"

# --- Model Architecture ---
model:
  num_layers: 4
  hidden_features: 64
  max_z: 120 # Safe upper bound
  # Input Dims
  num_cheap_dft_inputs: 12
  num_precision_settings: 13  # 12-dim bp one-hot + 1 k-density scalar (bp=11 fix)
  num_geo_inputs: 7

# --- Training Hyperparameters ---
training:
  epochs: 800
  batch_size: 32
  learning_rate: 1e-3

# --- Scaling Factors ---
# Used only for asinh.
# scaling:
#   scalar_scale: 1000.0  # For Energy/Gap
#   position_scale: 100.0 # For Positions/Lattice

# --- Loss Weights ---
weights:
  delta_e: 1.0
  delta_gap: 1.0
  delta_r: 1.0
  delta_geo: 1.0
