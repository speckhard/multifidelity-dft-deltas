# conf/painn_denoising_config.yaml
# Config for FiLM-PaiNN with Fidelity-Aware Denoising.

defaults:
  - _self_

model_type: "painn"

# --- WandB Settings ---
wandb_project: "painn-delta-denoising"
wandb_group: "default_experiment"

# --- Paths ---
data_file: "/u/dansp/egnn/relaxation_data_with_kpoints/data/delta_combined_relaxations_23_51__25_1_2026_egnn_data.pt"
job_name: "painn_denoising_run"

# --- Model Architecture ---
model:
  num_layers: 3
  hidden_dim: 128
  max_z: 120
  num_cheap_dft_inputs: 12
  num_precision_settings: 13  # 12-dim bp one-hot + 1 k-density scalar (bp=11 fix)
  num_geo_inputs: 7
  num_rbf: 20
  cutoff: 5.0
  use_film: true

# --- Training Hyperparameters ---
training:
  epochs: 800
  batch_size: 32
  learning_rate: 1e-3
  loss_function: "nll"

# --- Denoising Hyperparameters ---
denoising_weight: 0.1
noise_scales:
  low: 0.01    # sigma for high-fidelity (precise DFT)
  high: 0.1    # sigma for low-fidelity (cheap DFT)

# --- Loss Weights ---
weights:
  delta_e: 1.0
  delta_gap: 1.0
  delta_r: 1.0
  delta_vol: 1.0
  delta_lat: 1.0
